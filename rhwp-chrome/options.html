<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>rhwp 설정</title>
  <style>
    @font-face { font-family: 'KoreanFont'; src: local('Malgun Gothic'), local('Apple SD Gothic Neo'), local('Nanum Gothic'), local('Noto Sans KR'), local('Pretendard'); }
    body { font-family: 'KoreanFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    h2 { font-size: 16px; margin: 20px 0 12px; color: #555; }
    .option { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .option label { cursor: pointer; }
    .saved { color: #16a34a; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
    .saved.show { opacity: 1; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .info { font-size: 13px; color: #6b7280; }
    .text-input { width: 100%; max-width: 380px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: monospace; box-sizing: border-box; }
    .text-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .select-input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: white; cursor: pointer; }
    .select-input:focus { outline: none; border-color: #3b82f6; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .button { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; cursor: pointer; background: white; }
    .button:hover { background: #f9fafb; }
    .button.primary { background: #3b82f6; color: white; border-color: #3b82f6; }
    .button.primary:hover { background: #2563eb; }
    .button.danger { background: #ef4444; color: white; border-color: #ef4444; }
    .button.danger:hover { background: #dc2626; }
    .test-result { font-size: 13px; margin-top: 8px; padding: 8px 12px; border-radius: 6px; }
    .test-result.success { background: #dcfce7; color: #166534; }
    .test-result.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1 id="title">rhwp 설정</h1>

  <h2 id="sectionGeneral">일반</h2>
  <div class="option">
    <input type="checkbox" id="autoOpen" checked>
    <label for="autoOpen" id="labelAutoOpen">HWP/HWPX 다운로드 시 자동으로 뷰어에서 열기</label>
  </div>

  <div class="option">
    <input type="checkbox" id="showBadges" checked>
    <label for="showBadges" id="labelShowBadges">웹페이지에서 HWP 링크 옆에 아이콘 표시</label>
  </div>

  <div class="option">
    <input type="checkbox" id="hoverPreview" checked>
    <label for="hoverPreview" id="labelHoverPreview">HWP 링크에 마우스를 올리면 미리보기 표시</label>
  </div>

  <hr>

  <h2 id="sectionAi">AI 설정</h2>
  <div class="option" style="flex-direction:column; align-items:stretch;">
    <label for="aiApiKey" id="labelApiKey" style="font-weight:500;cursor:default;">OpenAI API 키</label>
    <input type="password" id="aiApiKey" class="text-input" placeholder="sk-..." autocomplete="off">
    <div class="hint" id="hintApiKey">platform.openai.com에서 발급</div>
  </div>

  <div class="option" style="flex-direction:column; align-items:stretch;">
    <label for="aiModel" id="labelModel" style="font-weight:500;cursor:default;">사용할 모델</label>
    <select id="aiModel" class="select-input">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
      <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
      <option value="o4-mini">GPT-4o-mini (new)</option>
      <option value="gpt-5.4-nano">GPT-5.4 nano</option>
    </select>
  </div>

  <div style="display:flex;gap:8px;margin-top:12px;">
    <button class="button primary" id="btnTestConnection">연결 테스트</button>
    <button class="button danger" id="btnClearApiKey">키 삭제</button>
  </div>
  <div id="testResult"></div>

  <span class="saved" id="saved">저장됨</span>

  <hr>
  <p class="info">
    rhwp v0.1.1 — MIT<br>
    <span id="privacy">로컬에서만 처리됩니다.</span>
  </p>

  <script src="options.js"></script>
</body>
</html>
