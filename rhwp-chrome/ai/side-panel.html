<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rhwp AI 어시스턴트</title>
  <link rel="stylesheet" href="side-panel.css">
</head>
<body>
  <div id="app">
    <header class="panel-header">
      <h1 class="panel-title" id="panelTitle"></h1>
      <button id="settingsBtn" class="icon-btn" title="설정">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <div id="apiKeyWarning" class="warning" style="display:none;">
      <span id="warningText"></span>
      <button id="openSettings" class="btn-link"></button>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" data-suggestion="table">
        <span class="suggestion-icon">⊞</span>
        <span class="suggestion-label" id="sugTable"></span>
      </button>
      <button class="suggestion-btn" data-suggestion="format">
        <span class="suggestion-icon">Aa</span>
        <span class="suggestion-label" id="sugFormat"></span>
      </button>
      <button class="suggestion-btn" data-suggestion="write">
        <span class="suggestion-icon">✎</span>
        <span class="suggestion-label" id="sugWrite"></span>
      </button>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="input-area">
      <textarea id="userInput" class="input-field" rows="3" placeholder="문서 작성 명령을 입력하세요..."></textarea>
      <div class="input-actions">
        <button id="sendBtn" class="btn-primary" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span id="sendLabel"></span>
        </button>
        <button id="cancelBtn" class="btn-danger" style="display:none;">
          <span id="cancelLabel"></span>
        </button>
        <button id="executeBtn" class="btn-secondary" style="display:none;" title="AI 응답을 문서에 적용">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="executeLabel"></span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="side-panel.js"></script>
</body>
</html>
